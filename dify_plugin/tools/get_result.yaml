identity:
  name: get_result
  author: Dify Helper
  label:
    en_US: Get Task Result
    zh_Hans: 获取任务结果
description:
  en_US: Fetch the result of a completed Claude Code task by task_id via bridge service
  zh_Hans: 通过桥接服务按任务 ID 获取已完成的 Claude Code 任务结果
parameters:
  - name: task_id
    type: string
    required: true
    label:
      en_US: Task ID
      zh_Hans: 任务 ID
    help:
      en_US: The task_id returned by submit_task
      zh_Hans: 由 submit_task 返回的任务 ID
    auto_generate: false
    placeholder:
      en_US: Paste the task_id returned by submit_task
      zh_Hans: 粘贴 submit_task 返回的 task_id
extra:
  python:
    source: tools/get_result.py
output:
  result:
    type: string
    label:
      en_US: Result
      zh_Hans: 结果
